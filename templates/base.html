<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}URL Shortener{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }
    header {
      background: #2d3748;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header a { color: #fff; text-decoration: none; font-size: 1.4rem; font-weight: 700; }
    header span { font-size: 1.6rem; }
    main { max-width: 800px; margin: 2.5rem auto; padding: 0 1rem; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; color: #2d3748; }
    h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #4a5568; }
    p.subtitle { color: #718096; margin-bottom: 1.5rem; }
    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-input:focus { outline: none; border-color: #4299e1; }
    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 2rem;
      background: #4299e1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #3182ce; }
    .btn-sm { padding: 0.4rem 1rem; font-size: 0.85rem; margin-top: 0; }
    .result-box {
      background: #ebf8ff;
      border: 2px solid #90cdf4;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .result-box a { color: #2b6cb0; font-weight: 600; word-break: break-all; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.6rem 0.75rem; background: #edf2f7; color: #4a5568; font-weight: 600; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #e2e8f0; word-break: break-all; }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      background: #e2e8f0;
      border-radius: 999px;
      font-size: 0.8rem;
      color: #4a5568;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin: 1rem 0; }
    .stat-card { background: #edf2f7; border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-card .number { font-size: 2rem; font-weight: 700; color: #2b6cb0; }
    .stat-card .label { font-size: 0.85rem; color: #718096; }
    footer { text-align: center; padding: 2rem; color: #a0aec0; font-size: 0.85rem; }
    .error { color: #c53030; font-size: 0.85rem; margin-top: 0.4rem; }
  </style>
</head>
<body>
  <header>
    <span>🔗</span>
    <a href="/">URL Shortener</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>URL Shortener &mdash; Built with Django &amp; deployed on AWS EC2</footer>
</body>
</html>
