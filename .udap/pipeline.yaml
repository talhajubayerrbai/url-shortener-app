version: 1
name: url-shortener-app
vcs: github

stages:
  - id: lint
    kind: lint
    needs: []
    timeout_minutes: 10
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        run: flake8 shortener/ manage.py --max-line-length=120 --exclude=shortener/migrations

  - id: test
    kind: test
    needs: [lint]
    timeout_minutes: 10
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: python manage.py test shortener

  - id: provision
    kind: provision
    needs: [test]
    timeout_minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
      TF_VAR_domain_name: url-shortener-app.udap.dev
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infra
      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve
        working-directory: infra

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 20
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
      TF_VAR_domain_name: url-shortener-app.udap.dev
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infra
      - name: Get EC2 IP
        id: get_ip
        run: echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> "$GITHUB_OUTPUT"
        working-directory: infra
      - name: Install Ansible
        run: pip install ansible-core
      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Scan known hosts
        run: ssh-keyscan -H "${{ steps.get_ip.outputs.ec2_ip }}" >> ~/.ssh/known_hosts
      - name: Write inventory
        run: |
          cat > ansible/inventory.ini <<EOF
          [web]
          ${{ steps.get_ip.outputs.ec2_ip }} ansible_user=${{ secrets.SSH_USER }} ansible_ssh_private_key_file=~/.ssh/deploy_key
          EOF
      - name: Run Ansible playbook
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/site.yml

  - id: verify
    kind: verify
    needs: [provision, configure]
    timeout_minutes: 10
    steps:
      - name: Health check
        run: |
          curl --fail --retry 15 --retry-delay 20 --retry-all-errors \
            https://url-shortener-app.udap.dev/

rollback:
  strategy: manual
