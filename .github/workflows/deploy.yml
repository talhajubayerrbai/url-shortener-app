name: deploy
'on':
  workflow_dispatch: {}
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install flake8
      run: pip install flake8
    - name: Lint
      run: flake8 shortener/ manage.py --max-line-length=120 --exclude=shortener/migrations
  test:
    runs-on: ubuntu-latest
    needs:
    - lint
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install deps
      run: pip install -r requirements.txt
    - name: Run tests
      run: python manage.py test shortener
  provision:
    runs-on: ubuntu-latest
    needs:
    - test
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
    timeout-minutes: 30
    outputs:
      ec2_ip: ${{ steps.get_ip.outputs.ec2_ip }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Terraform Init
      run: "terraform init -input=false -reconfigure \\\n  -backend-config=\"bucket=${{\
        \ secrets.TF_STATE_BUCKET }}\" \\\n  -backend-config=\"key=${{ secrets.PROJECT_NAME\
        \ }}/terraform.tfstate\" \\\n  -backend-config=\"region=us-east-1\"\n"
      working-directory: infra
    - name: Terraform Apply
      run: terraform apply -input=false -auto-approve
      working-directory: infra
    - id: get_ip
      name: Get EC2 IP
      run: echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> "$GITHUB_OUTPUT"
      working-directory: infra
  configure:
    runs-on: ubuntu-latest
    needs:
    - provision
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: Install Ansible
      run: pip install ansible-core
    - name: Write SSH key
      run: 'mkdir -p ~/.ssh

        printf ''%s\n'' "$SSH_KEY" > ~/.ssh/deploy_key

        chmod 600 ~/.ssh/deploy_key

        '
      env:
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Scan known hosts
      run: ssh-keyscan -H "${{ needs.provision.outputs.ec2_ip }}" >> ~/.ssh/known_hosts
    - name: Write inventory
      run: 'cat > ansible/inventory.ini <<EOF

        [web]

        ${{ needs.provision.outputs.ec2_ip }} ansible_user=${{ secrets.SSH_USER }}
        ansible_ssh_private_key_file=~/.ssh/deploy_key

        EOF

        '
    - name: Run Ansible playbook
      run: 'ansible-playbook -i ansible/inventory.ini ansible/site.yml

        '
      env:
        DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
  verify:
