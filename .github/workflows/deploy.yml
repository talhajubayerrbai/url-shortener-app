      run: echo "alb_dns=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
      working-directory: infra
    - name: Health check
      run: "curl --fail --retry 15 --retry-delay 20 --retry-all-errors \\\n  \"http://${{\
        \ steps.get_alb.outputs.alb_dns }}/\"\n"
