        [web]

        ${{ steps.get_outputs.outputs.ec2_ip }} ansible_user=${{ secrets.SSH_USER
        }} ansible_ssh_private_key_file=~/.ssh/deploy_key

        EOF

        '
    - name: Run Ansible playbook
      run: "ansible-playbook -i ansible/inventory.ini ansible/site.yml \\\n  -e \"\
        rds_host=${{ steps.get_outputs.outputs.rds_host }}\"\n"
      env:
        DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
