        \ }}/terraform.tfstate\" \\\n  -backend-config=\"region=us-east-1\"\n"
      working-directory: infra
    - name: Import existing RDS if state-drift
      run: "if ! terraform state show aws_db_instance.main > /dev/null 2>&1; then\n\
        \  echo \"aws_db_instance.main not in state \u2014 importing...\"\n  terraform\
        \ import -input=false aws_db_instance.main \"${{ secrets.PROJECT_NAME }}-db\"\
        \ || echo \"Import returned non-zero (instance may not exist yet \u2014 OK)\"\
        \nelse\n  echo \"aws_db_instance.main already in state \u2014 skipping import\"\
        \nfi\n"
      working-directory: infra
    - name: Terraform Apply
      run: terraform apply -input=false -auto-approve
      working-directory: infra
  configure:
    runs-on: ubuntu-latest
    needs:
    - provision
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_secret_key: ${{ secrets.DJANGO_SECRET_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
