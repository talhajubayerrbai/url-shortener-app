    - id: get_outputs
      name: Get EC2 IP and RDS host
      run: 'echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> "$GITHUB_OUTPUT"

        echo "rds_host=$(terraform output -raw rds_host)" >> "$GITHUB_OUTPUT"

        '
      working-directory: infra
    - name: Install Ansible
      run: pip install ansible-core
    - name: Write SSH key
      run: 'mkdir -p ~/.ssh

        printf ''%s\n'' "$SSH_KEY" > ~/.ssh/deploy_key

        chmod 600 ~/.ssh/deploy_key

        '
      env:
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Scan known hosts
      run: ssh-keyscan -H "${{ steps.get_outputs.outputs.ec2_ip }}" >> ~/.ssh/known_hosts
