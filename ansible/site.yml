---
- name: Configure URL Shortener on EC2
  hosts: web
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/url-shortener-app
    venv_dir: /opt/url-shortener-app/venv
    app_user: www-data
    django_settings: url_shortener_app.settings

  tasks:
    - name: Wait for SSH to be available
      wait_for_connection:
        delay: 5
        timeout: 120

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      retries: 5
      delay: 10

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-venv
          - python3-pip
          - git
          - acl
          - libpq-dev
        state: present

    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Copy application files
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../"
        dest: "{{ app_dir }}/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'
        directory_mode: '0755'

    - name: Create Python virtualenv and install dependencies
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        virtualenv_command: python3 -m venv

    - name: Write .env file
      ansible.builtin.template:
        src: env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'
      no_log: true

    - name: Wait for RDS to be reachable on port 5432
      wait_for:
        host: "{{ rds_host }}"
        port: 5432
        timeout: 120
        delay: 5

    - name: Run Django migrations
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/python manage.py migrate --noinput"
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"
      changed_when: true

    - name: Collect static files
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/python manage.py collectstatic --noinput"
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"
      changed_when: true

    - name: Write systemd service unit
      ansible.builtin.template:
        src: gunicorn.service.j2
        dest: /etc/systemd/system/url-shortener.service
        owner: root
        group: root
        mode: '0644'

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start url-shortener service
      ansible.builtin.systemd:
        name: url-shortener
        enabled: true
        state: restarted

    - name: Wait for Gunicorn to be available on port 8000
      wait_for:
        host: localhost
        port: 8000
        timeout: 60
